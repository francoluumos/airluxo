name: E2E (Playwright)

# Runs the end-to-end suite on every push/PR to main and staging. The uploaded
# HTML report is the record of what was tested, when, and on which browsers.
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  e2e:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      # Optional: set these repo secrets to test data-dependent flows against a
      # real backend. Without them the build still runs and smoke tests pass.
      - run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
