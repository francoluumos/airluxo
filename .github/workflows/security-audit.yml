name: Weekly security audit

# Runs a Claude-powered security + code review every Sunday evening (Europe/Zurich),
# then opens a GitHub Issue with the findings, a DRAFT pull request with any safe
# mechanical fixes, and emails the founder a summary so it can be reviewed/confirmed.
#
# GitHub cron is UTC and does not follow DST: 17:41 UTC ≈ 19:41 in Zurich (CEST) /
# 18:41 (CET). Also runnable on demand via the Actions tab.
#
# Required repo secrets: ANTHROPIC_API_KEY (audit), RESEND_API_KEY (email).
# Optional repo secrets/vars: RESEND_FROM, AUDIT_EMAIL_TO.
on:
  schedule:
    - cron: '41 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Stamp the run date
        id: meta
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "branch=security/audit-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Claude performs the audit, writes security-report.md, and may apply small,
      # clearly-correct fixes to the working tree. It does not touch git/PRs/issues.
      - name: Run security audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: 'Follow the instructions in scripts/security-audit/audit.md exactly.'
          claude_args: '--allowedTools "Read,Grep,Glob,Edit,Write,Bash(npm run build),Bash(git diff)"'

      - name: Ensure a report exists
        run: |
          if [ ! -f security-report.md ]; then
            echo "# Weekly security audit — ${{ steps.meta.outputs.date }}" > security-report.md
            echo "" >> security-report.md
            echo "_The audit step produced no report file. Check the workflow logs._" >> security-report.md
          fi

      - name: Open / update the tracking issue
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('security-report.md', 'utf8');
            const title = `🔒 Weekly Security Audit — ${{ steps.meta.outputs.date }}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security'],
            });
            core.setOutput('number', issue.data.number);
            core.setOutput('url', issue.data.html_url);

      # Open a DRAFT PR if Claude applied any fixes to the tree (no-op otherwise).
      - name: Open draft PR with any fixes
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.meta.outputs.branch }}
          base: staging
          draft: true
          title: 'Security audit fixes — ${{ steps.meta.outputs.date }}'
          commit-message: 'chore(security): weekly audit fixes ${{ steps.meta.outputs.date }}'
          body: |
            Automated draft from the weekly security audit.
            Findings: #${{ steps.issue.outputs.number }}

            Review each change before merging. Generated by `.github/workflows/security-audit.yml`.
          labels: security

      - name: Email the founder
        if: ${{ always() && steps.issue.outputs.url != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          AUDIT_EMAIL_TO: ${{ vars.AUDIT_EMAIL_TO }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          RUN_DATE: ${{ steps.meta.outputs.date }}
        run: bash scripts/security-audit/notify.sh
